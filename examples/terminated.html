<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Session Terminated</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon-terminated.svg">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a0a 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .container {
            max-width: 480px;
            padding: 40px 24px;
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 24px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(239, 68, 68, 0.3);
        }
        
        .icon svg {
            width: 50px;
            height: 50px;
            stroke: #ef4444;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #ffffff;
        }
        
        .message {
            font-size: 16px;
            line-height: 1.7;
            color: #9ca3af;
            margin-bottom: 24px;
        }
        
        .warning {
            display: inline-block;
            padding: 12px 24px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #ef4444;
            font-weight: 600;
            font-size: 14px;
        }
        
        .code {
            margin-top: 32px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
        </div>
        <h1>Session Terminated</h1>
        <p class="message">
            Developer tools access has been detected. Your session has been terminated for security reasons.
            All local data has been cleared.
        </p>
        <div class="warning">This action has been logged</div>
        <div class="code">Error Code: SEC_DEVTOOLS_001</div>
    </div>
    
    <script>
        (function() {
            'use strict';
            
            var PAST_DATE_STRING = 'Thu, 01 Jan 1970 00:00:00 UTC';
            
            // Clear everything on this page too
            try {
                localStorage.clear();
                sessionStorage.clear();
                
                // Clear cookies properly with past date
                var cookies = document.cookie.split(';');
                
                for (var i = 0; i < cookies.length; i++) {
                    var cookie = cookies[i];
                    var eqPos = cookie.indexOf('=');
                    var name = eqPos > -1 ? cookie.substring(0, eqPos).trim() : cookie.trim();
                    
                    // Skip empty cookie names
                    if (!name) continue;
                    
                    // Try multiple combinations to ensure deletion
                    document.cookie = name + '=;expires=' + PAST_DATE_STRING + ';path=/';
                    document.cookie = name + '=;expires=' + PAST_DATE_STRING + ';path=/;domain=' + window.location.hostname;
                    document.cookie = name + '=;expires=' + PAST_DATE_STRING + ';path=/;domain=.' + window.location.hostname;
                }
                
                // Unregister service workers with error handling
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function(registrations) {
                        registrations.forEach(function(registration) {
                            registration.unregister().catch(function(error) {
                                console.error('DevTools Terminator: Service worker unregistration failed', error);
                            });
                        });
                    }).catch(function(error) {
                        console.error('DevTools Terminator: Service worker listing failed', error);
                    });
                }
                
                // Clear caches with error handling
                if ('caches' in window) {
                    caches.keys().then(function(names) {
                        names.forEach(function(name) {
                            caches.delete(name).catch(function(error) {
                                console.error('DevTools Terminator: Cache deletion failed', error);
                            });
                        });
                    }).catch(function(error) {
                        console.error('DevTools Terminator: Cache listing failed', error);
                    });
                }
            } catch (error) {
                console.error('DevTools Terminator: Storage clearing failed', error);
            }
            
            // Prevent navigation back
            history.pushState(null, '', window.location.href);
            window.addEventListener('popstate', function() {
                history.pushState(null, '', window.location.href);
            });
            
            // Disable all interactions
            document.addEventListener('contextmenu', function(event) { 
                event.preventDefault(); 
                return false;
            });
            
            document.addEventListener('keydown', function(event) {
                if (event.key === 'F12' ||
                    (event.ctrlKey && event.shiftKey) ||
                    (event.ctrlKey && (event.key === 'u' || event.key === 'U')) ||
                    (event.ctrlKey && (event.key === 's' || event.key === 'S'))) {
                    event.preventDefault();
                    return false;
                }
            });
        })();
    </script>
</body>
</html>
