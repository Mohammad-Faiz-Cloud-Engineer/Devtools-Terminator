<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTools Terminator - TypeScript Demo</title>
    
    <!-- 1. Define Type-Safe Configuration (Simulating compiled TS) -->
    <script>
        window.DEVTOOLS_TERMINATOR_CONFIG = {
            terminationUrl: '../public/terminated.html',
            checkInterval: 100,
            onTerminate: function(code) {
                document.getElementById('log').innerText = 'DevTools Detected! Code: ' + code;
                document.getElementById('log').style.color = '#ef4444';
            }
        };
    </script>
    
    <!-- 2. Load the library -->
    <script src="../src/client/devtools-terminator.js"></script>
    
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; background: #fafafa; }
        .card { max-width: 500px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px; border: 1px solid #e5e7eb; }
        .log-box { margin-top: 1.5rem; padding: 1rem; background: #1f2937; color: #a7f3d0; border-radius: 4px; font-family: monospace; }
        button { background: #dc2626; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>TypeScript Integration</h1>
        <p>This demo illustrates how the TypeScript definitions interact with the JavaScript execution at runtime.</p>
        
        <p>Try opening Developer Tools, or manually trigger the API below.</p>
        
        <button onclick="window.DevToolsTerminator.terminate()">Test Manual .terminate() API</button>
        
        <div class="log-box" id="log">
            Status: Active & Listening...
        </div>
    </div>
</body>
</html>
