<!--
    NoScript Handler for DevTools Terminator
    
    This snippet detects when JavaScript is disabled and immediately
    redirects to the termination page.
    
    Usage: Include this BEFORE loading devtools-terminator script
    
    <noscript>
        <meta http-equiv="refresh" content="0; url=/terminated.html">
    </noscript>
    
    Or use the full version below for better UX:
-->

<noscript>
    <!-- Immediate redirect -->
    <meta http-equiv="refresh" content="0; url=/terminated.html">
    
    <!-- Fallback message if meta refresh doesn't work -->
    <style>
        body { display: none !important; }
        .noscript-warning {
            display: block !important;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 999999;
        }
        .noscript-warning .container {
            max-width: 480px;
            padding: 40px 24px;
        }
        .noscript-warning h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #ef4444;
        }
        .noscript-warning p {
            font-size: 16px;
            line-height: 1.7;
            color: #9ca3af;
            margin-bottom: 24px;
        }
    </style>
    
    <div class="noscript-warning">
        <div class="container">
            <h1>⛔ JavaScript Required</h1>
            <p>
                This page requires JavaScript to be enabled for security verification.
                Your session has been terminated.
            </p>
            <p style="font-size: 14px; color: #6b7280;">
                Error Code: SEC_NOJS_001
            </p>
        </div>
    </div>
</noscript>
